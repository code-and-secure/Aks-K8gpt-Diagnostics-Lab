# manifests/crashloop-pod.yaml
# Bug: container command exits immediately with a non-zero code -> CrashLoopBackOff.
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-pod
  namespace: k8sgpt-lab
  labels:
    app: crashloop-pod
spec:
  containers:
    - name: crasher
      image: busybox:1.36
      command: ["sh", "-c", "echo 'simulating a startup failure' && exit 1"]
  restartPolicy: Always
