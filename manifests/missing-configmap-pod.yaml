# manifests/missing-configmap-pod.yaml
# Bug: envFrom references a ConfigMap that was never created -> CreateContainerConfigError.
apiVersion: v1
kind: Pod
metadata:
  name: missing-configmap-pod
  namespace: k8sgpt-lab
  labels:
    app: missing-configmap-pod
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      envFrom:
        - configMapRef:
            name: config-that-does-not-exist
